##
# DOCKER COMPOSE - ONETIME SECRET (SIMPLE)
#
# Minimal two-service deployment: App + Valkey (Redis-compatible).
# No reverse proxy, no message queue, no workers.
#
# Uses pre-built images from Docker Hub. To pin a version:
#   OTS_IMAGE_TAG=v0.24.6 docker compose up
#
# To build from source instead, use Docker Bake:
#   docker buildx bake -f docker/bake.hcl main
#
# See docker/README.md for complete setup and usage documentation.

services:
  app:
    image: onetimesecret/onetimesecret:${OTS_IMAGE_TAG:-latest}
    container_name: onetime-app
    depends_on:
      maindb:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - RACK_ENV=${RACK_ENV:-production}
      - VALKEY_URL=redis://maindb:6379/0
      - SECRET=${SECRET:?SECRET must be set — run ./install.sh}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - AUTHENTICATION_MODE=${AUTHENTICATION_MODE:-simple}
      - ARGON2_SECRET=${ARGON2_SECRET:-}
      - FEDERATION_SECRET=${FEDERATION_SECRET:-}
      - IDENTIFIER_SECRET=${IDENTIFIER_SECRET:-}
    entrypoint: ['./bin/entrypoint.sh']
    stdin_open: true
    tty: true
    logging:
      driver: 'json-file'
      options:
        max-size: '60m'
        max-file: '3'
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - ../../data:/app/data

  maindb:
    image: valkey/valkey:8.1-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    container_name: onetime-maindb
    command: >
      valkey-server
      --appendonly yes
      --appendfilename onetime.aof
      --appendfsync everysec
      --dbfilename onetime.rdb
      --save 157680000 1
      --bind 0.0.0.0
      --port 6379
      --databases 1
      --timeout 30
      --loglevel notice
      --rdbcompression yes
    logging:
      driver: 'json-file'
      options:
        max-size: '60m'
        max-file: '3'
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - maindb-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  maindb-data:
    name: onetime_maindb_data
