##
# Pre-Push Hooks Configuration
#
# Quality control checks that run before code is pushed to remote repositories
#
# Setup:
#   1. Install all hooks (run from .pre-commit-config.yaml instructions):
#       $ pre-commit install && pre-commit install --hook-type pre-push -c .pre-push-config.yaml
#
#   2. Install required dependencies:
#       - Ruby + Bundler (bundle install)
#       - Node.js + pnpm (pnpm install)
#       - Redis running on localhost:6379
#
# Usage:
#   Hooks run automatically on 'git push'
#
#   Manual execution:
#   - Run all checks:
#     $ pre-commit run --config .pre-push-config.yaml --all-files
#
#   - Run single check:
#     $ pre-commit run <hook-id> --config .pre-push-config.yaml
#     Example: pre-commit run rubocop --config .pre-push-config.yaml
#
# Included Checks:
#   - YAML/JSON/TOML validation
#   - Code style enforcement (line endings, shebangs, case conflicts)
#   - Parallel checks (runs concurrently):
#     - Ruby specs via rake spec:fast (unit + CLI + apps)
#     - ESLint (pnpm lint)
#     - TypeScript type checking (pnpm type-check)
#
# Related Files:
#   - .pre-commit-config.yaml: Lightweight pre-commit checks
#   - Documentation: https://pre-commit.com
#
# Note: These intensive checks run before pushing to catch issues early
# but allow faster local development with lighter pre-commit hooks.

# Run all checks to see complete picture before pushing
fail_fast: false

# Skip generated/dependency directories
exclude: '^(vendor|node_modules|dist|build)/'

default_install_hook_types:
  - pre-push

default_stages: [pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        name: Validate YAML files
        args: ['--allow-multiple-documents']
        files: \.(yaml|yml)$

      - id: check-toml
        name: Validate TOML files
        files: \.toml$

      - id: check-json
        name: Validate JSON files
        files: \.json$

      - id: pretty-format-json
        name: Format JSON files
        args: ['--autofix', '--no-sort-keys']
        files: \.json$

      - id: mixed-line-ending
        name: Check line endings
        args: [--fix=lf]

      - id: check-case-conflict
        name: Check for case conflicts

      - id: check-executables-have-shebangs
        name: Check executable shebangs

      - id: check-shebang-scripts-are-executable
        name: Check shebang scripts are executable

      - id: forbid-submodules
        name: Check for submodules

  # Parallel checks: Ruby specs + ESLint + TypeScript type checking
  # Runs all three concurrently, reducing total time from ~115s to ~90s
  - repo: local
    hooks:
      - id: parallel-checks
        stages: [pre-push]
        name: Parallel checks (Ruby + TypeScript)
        entry: ./scripts/parallel-pre-push.sh
        language: script
        pass_filenames: false
        always_run: true
