allowBuilds:
  '@sentry/cli': true
  esbuild: true
  unrs-resolver: true
  vue-demi: false

overrides:
  '@babel/core': '>=7.29.6 <8'
  '@types/estree': '1.0.9'
  esbuild: '>=0.28.1'
  brace-expansion: '1.1.15'
  flatted: '^3.4.2'
  form-data: '>=4.0.6'
  js-yaml: '>=3.15.0'
  markdown-it: '>=14.2.0'
  undici: '>=6.27.0 <7'
  ws: '>=8.21.0'
  yaml: '^2.8.3'

peerDependencyRules:
  allowedVersions:
    typescript: '5.9.3'
    'unplugin-vue-markdown>vite': '8'
    'vite-plugin-inspect>vite': '8'
    'vite-dev-rpc>vite': '8'
    'vite-hot-client>vite': '8'
