# .github/workflows/claude-code-review.yml

name: Claude Code Review

on:
  pull_request:
    branches:
      - 'feature/*'
      - 'fix/*'
      - 'wip/*'
      - 'rel/*'
      - 'develop'
      - 'main'
    types: [opened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model for this run (overrides the CLAUDE_MODEL repo variable)"
        type: choice
        required: false
        default: claude-sonnet-4-6
        options:
          - claude-sonnet-4-6
          - claude-opus-4-6
          - claude-haiku-4-5-20251001

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    # if: ${{ !startsWith(github.head_ref, 'deps/') }}
    runs-on: ubuntu-latest
    # Run only when ALL of the following are true:
    #   1. Author is not a bot (renovate, dependabot, etc. surface as 'name[bot]' in github.actor).
    #   2. PR head is not from a fork. Fork PRs run without access to repository
    #      secrets, so CLAUDE_CODE_OAUTH_TOKEN is empty and the action would fail.
    #      External contributions should be reviewed manually or via a maintainer-triggered
    #      workflow that runs against the merged ref.
    #   3. The event is one of:
    #        - a freshly opened PR (always reviewed on open),
    #        - a 'claude-review' label being added (manual trigger), or
    #        - a push to a PR that already carries the 'claude-review' label
    #          (so subsequent commits keep getting reviewed without re-labeling).
    if: ${{
      !endsWith(github.actor, '[bot]') &&
      !github.event.pull_request.head.repo.fork &&
      (
        (github.event.action == 'opened') ||
        (github.event.action == 'labeled' && github.event.label.name == 'claude-review') ||
        (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'claude-review'))
      )
      }}

    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # Note: This workflow has been observed to fail with "null is not an object
      # (evaluating 'c.body')". Deleting PR comments before/during execution may
      # be related. Re-run after comment activity settles.
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Primary model precedence: the workflow_dispatch "model" input (manual
          # runs) -> the CLAUDE_MODEL repo variable -> this built-in default. The
          # action's frozen default (claude-sonnet-4-20250514) is retired and
          # 404s. Fall back to Sonnet on overload.
          model: "${{ inputs.model || vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}"
          fallback_model: "${{ vars.CLAUDE_FALLBACK_MODEL || 'claude-sonnet-4-6' }}"

          # Direct prompt for automated review (no @claude mention needed)
          direct_prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Be constructive and helpful in your feedback.

          # Optional: Use sticky comments to make Claude reuse the same comment on subsequent pushes to the same PR
          use_sticky_comment: true

          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' &&
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}

          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"

          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')

      - name: Remove claude-review label
        # Remove label whether success or failure - prevents getting stuck
        if: always() && github.event.action != 'opened'
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'claude-review'
              });
            } catch (error) {
              console.log('Label not found or already removed');
            }
