# ==============================================================================
# SECRET-rotation lane (install-onboarding C10 §5)
# ==============================================================================
# Proves the QS-6 fix end to end with real processes and a real datastore:
#
#   boot clean -> create a secret -> restart with a regenerated SECRET
#     -> boot is LOUD (mismatch warning) but not bricked (warn mode)
#     -> /health/advanced reports the degraded secret_verifier sub-check
#     -> the reveal fails SAFE (503 secret_undecryptable; record + ciphertext
#        survive)
#   -> restore the original SECRET -> verifier ok -> the reveal returns the
#      original plaintext exactly once (at-most-once still holds).
#
# Same artifact locally and in CI: scripts/test-install/secret-rotation.sh.
# Environment setup mirrors the fresh-clone lane (bin/setup provides gems,
# generated/locales+schemas, and a seeded etc/config.yaml); the lane itself
# starts an isolated throwaway datastore and app instance.
# ==============================================================================
name: SECRET rotation lane

on:
  pull_request:
    paths:
      - 'lib/onetime/secret_verifier.rb'
      - 'lib/onetime/key_derivation.rb'
      - 'lib/onetime/initializers/**'
      - 'lib/onetime/models/secret/**'
      - 'lib/onetime/models/features/state_cas.rb'
      - 'lib/onetime/application/otto_hooks.rb'
      - 'lib/tasks/init.rake'
      - 'apps/api/v2/logic/secrets/**'
      - 'apps/web/core/controllers/health.rb'
      - 'scripts/test-install/secret-rotation.sh'
      - '.github/workflows/secret-rotation.yml'
  schedule:
    # Weekly: catches runner/dependency rot with no commit (the
    # scheduled-lane pattern shared by the other install lanes).
    - cron: '41 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-rotation:
    name: rotated SECRET is loud, non-destructive, recoverable
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The lane starts its own throwaway instance on :2129; the apt-started
      # service on :6379 is harmless (same posture as fresh-clone).
      - name: Install datastore (redis-server, Valkey-compatible)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server

      - name: Setup Ruby (.ruby-version)
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: false  # bin/setup runs `bundle install` itself

      - name: Setup Node (.node-version)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Python (locales:sync)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # bin/setup provides everything the lane's preflight demands: gems,
      # generated/locales, generated/schemas, seeded etc/config.yaml.
      - name: Run bin/setup
        run: bin/setup

      - name: Run secret-rotation lane
        run: ./scripts/test-install/secret-rotation.sh
