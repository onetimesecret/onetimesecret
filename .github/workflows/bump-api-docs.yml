# .github/workflows/bump-api-docs.yml
#
# Bump.sh API documentation: deploy on merge, diff on PRs.
# Deploys v1/v2/v3 as branches within a single Bump.sh documentation,
# letting readers toggle between API versions on one page.
#
# See: https://docs.bump.sh/help/continuous-integration/github-actions/
#      https://docs.bump.sh/help/branching/
#
# Required GitHub Actions secrets:
#   BUMP_TOKEN             — documentation private token (Settings > CI Deployment)
#   BUMP_DOC_SLUG          — public API doc slug (found in doc settings on Bump.sh)
#
# Optional GitHub Actions secrets:
#   BUMP_INTERNAL_DOC_SLUG — internal API doc slug (Settings > CI Deployment on Bump.sh)
#
---
name: Check & deploy API documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/api/openapi.*.json'

  pull_request:
    branches:
      - main
    paths:
      - 'docs/api/openapi.*.json'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Public API versions (v1, v2, v3) ─────────────────────────────
  # Each version deploys as a Bump.sh branch (a version track, not a git branch)
  # within a single Bump.sh doc.
  deploy-doc:
    if: ${{ github.event_name != 'pull_request' }}
    name: Deploy API ${{ matrix.version }} on Bump.sh
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: v1
            file: docs/api/openapi.v1.json
          - version: v2
            file: docs/api/openapi.v2.json
          - version: v3
            file: docs/api/openapi.v3.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12
      - name: Deploy API documentation
        run: >
          bump deploy ${{ matrix.file }}
          --doc "$BUMP_DOC"
          --branch ${{ matrix.version }}
          --token "$BUMP_TOKEN"
        env:
          BUMP_DOC: ${{ secrets.BUMP_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}

  api-diff:
    if: ${{ github.event_name == 'pull_request' }}
    name: Diff API ${{ matrix.version }} on Bump.sh
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: v1
            file: docs/api/openapi.v1.json
          - version: v2
            file: docs/api/openapi.v2.json
          - version: v3
            file: docs/api/openapi.v3.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12
      - name: Diff API documentation
        run: >
          bump diff ${{ matrix.file }}
          --doc "$BUMP_DOC"
          --branch ${{ matrix.version }}
          --token "$BUMP_TOKEN"
        env:
          BUMP_DOC: ${{ secrets.BUMP_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}

  # ── Internal API ─────────────────────────────────────────────────
  # Deploys as a single document within its own hub, isolated from the public versioned docs.
  deploy-internal:
    if: ${{ github.event_name != 'pull_request' && secrets.BUMP_INTERNAL_DOC_SLUG != '' }}
    name: Deploy internal API on Bump.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12
      - name: Deploy internal API documentation
        run: >
          bump deploy docs/api/openapi.internal.json
          --doc "$BUMP_DOC"
          --token "$BUMP_TOKEN"
        env:
          BUMP_DOC: ${{ secrets.BUMP_INTERNAL_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}

  internal-diff:
    if: ${{ github.event_name == 'pull_request' && secrets.BUMP_INTERNAL_DOC_SLUG != '' }}
    name: Diff internal API on Bump.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12
      - name: Diff internal API documentation
        run: >
          bump diff docs/api/openapi.internal.json
          --doc "$BUMP_DOC"
          --token "$BUMP_TOKEN"
        env:
          BUMP_DOC: ${{ secrets.BUMP_INTERNAL_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}
