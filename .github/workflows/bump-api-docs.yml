# .github/workflows/bump-api-docs.yml
#
# Bump.sh API documentation: generate, deploy on merge, diff on PRs.
#
# Generates OpenAPI specs from Zod schemas (via pnpm openapi:generate) into
# generated/openapi/, then deploys or diffs them on Bump.sh. The generated
# files are ephemeral build artifacts — they are never committed to the repo.
# Bump.sh is the single canonical source for published API documentation.
#
# Deploys v1/v2/v3 as branches within a single Bump.sh documentation,
# letting readers toggle between API versions on one page.
#
# See: https://docs.bump.sh/help/continuous-integration/github-actions/
#      https://docs.bump.sh/help/branching/
#
# Required GitHub Actions secrets:
#   BUMP_TOKEN             — public API documentation token (Settings > CI Deployment)
#   BUMP_DOC_SLUG          — public API doc slug (found in doc settings on Bump.sh)
#
# Required for internal API docs (jobs run but fail if missing):
#   BUMP_INTERNAL_TOKEN    — internal hub token (separate from public BUMP_TOKEN)
#   BUMP_INTERNAL_HUB_ID   — internal hub ID on Bump.sh
#   BUMP_INTERNAL_DOC_SLUG — internal API doc slug
#
---
name: Check & deploy API documentation

on:
  push:
    branches:
      - main
    paths:
      - 'src/schemas/**/*.ts'
      - 'apps/api/*/routes.txt'
      - 'src/scripts/openapi/**'

  pull_request:
    branches:
      - main
    paths:
      - 'src/schemas/**/*.ts'
      - 'apps/api/*/routes.txt'
      - 'src/scripts/openapi/**'

  workflow_dispatch:

permissions:
  contents: read
  # We don't need write permission b/c the bump CLI uses its own token for API
  # updates, and we don't commit any generated files back to the repo. We only
  # need read access to fetch the source code and generate the specs.
  pull-requests: write

jobs:
  generate:
    name: Generate OpenAPI specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate OpenAPI specifications
        run: pnpm run openapi:generate -- --force

      - name: Validate generated JSON
        run: |
          shopt -s nullglob
          files=(generated/openapi/openapi.*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No OpenAPI spec files were generated"
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Validating $file..."
            if ! jq empty "$file" 2>/dev/null; then
              echo "Invalid JSON in $file"
              exit 1
            fi
            echo "Valid: $file"
          done

      - name: Upload generated specs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openapi-specs
          path: generated/openapi/openapi.*.json
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: generate
    if: ${{ github.event_name != 'pull_request' }}
    name: Deploy API docs on Bump.sh
    runs-on: ubuntu-latest
    steps:
      - name: Download generated specs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-specs
          path: generated/openapi

      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12

      - name: Deploy public API versions
        env:
          BUMP_DOC: ${{ secrets.BUMP_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}
        run: |
          for version in v1 v2 v3; do
            echo "Deploying ${version}..."
            bump deploy "generated/openapi/openapi.${version}.json" \
              --doc "$BUMP_DOC" \
              --branch "$version" \
              --token "$BUMP_TOKEN"
          done

      - name: Deploy internal API
        env:
          BUMP_HUB: ${{ secrets.BUMP_INTERNAL_HUB_ID }}
          BUMP_DOC: ${{ secrets.BUMP_INTERNAL_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_INTERNAL_TOKEN }}
        run: >
          bump deploy generated/openapi/openapi.internal.json
          --hub "$BUMP_HUB"
          --doc "$BUMP_DOC"
          --token "$BUMP_TOKEN"

  diff:
    needs: generate
    if: ${{ github.event_name == 'pull_request' }}
    name: Diff API docs on Bump.sh
    runs-on: ubuntu-latest
    steps:
      - name: Download generated specs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: openapi-specs
          path: generated/openapi

      - name: Install Bump.sh CLI
        run: npm install -g bump-cli@2.9.12

      - name: Diff public API versions
        env:
          BUMP_DOC: ${{ secrets.BUMP_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}
        run: |
          for version in v1 v2 v3; do
            echo "Diffing ${version}..."
            bump diff "generated/openapi/openapi.${version}.json" \
              --doc "$BUMP_DOC" \
              --branch "$version" \
              --token "$BUMP_TOKEN"
          done

      - name: Diff internal API
        env:
          BUMP_HUB: ${{ secrets.BUMP_INTERNAL_HUB_ID }}
          BUMP_DOC: ${{ secrets.BUMP_INTERNAL_DOC_SLUG }}
          BUMP_TOKEN: ${{ secrets.BUMP_INTERNAL_TOKEN }}
        run: >
          bump diff generated/openapi/openapi.internal.json
          --hub "$BUMP_HUB"
          --doc "$BUMP_DOC"
          --token "$BUMP_TOKEN"
