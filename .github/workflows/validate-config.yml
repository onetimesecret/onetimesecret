# .github/workflows/validate-config.yml
---
name: Validate YAML config
permissions:
  contents: read
  pull-requests: write

on:
  # push:
  #   branches:
  #     - 'main'
  #     - 'fix/*'
  #     - 'feature/*'
  #     - 'rel/*'

  # pull_request:
  #   branches:
  #     - main
  #     - develop
  #     - feature/*

  # Manual trigger option for debugging
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Enable tmate debugging for secure troubleshooting'
        required: false
        default: false

jobs:
  config-validation:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Ruby
        uses: ruby/setup-ruby@97b333846670e3cb692f29c0c5d42b71efc6bc93
        with:
          ruby-version: '3.4.9'
          bundler-cache: false  # DEBUG: disabled to rule out stale cache

      - name: Install Ruby dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '25'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node dependencies
        run: pnpm install

      - name: Generate JSON schemas
        run: pnpm run schemas:json:generate

      - name: Validate config.defaults.yaml against the generated schema
        run: bin/ots config validate
