# .github/workflows/validate-config.yml
---
name: Validate YAML config
permissions:
  contents: read
  pull-requests: write

on:
  # push:
  #   branches:
  #     - 'main'
  #     - 'fix/*'
  #     - 'feature/*'
  #     - 'rel/*'

  # pull_request:
  #   branches:
  #     - main
  #     - develop
  #     - feature/*

  # Manual trigger option for debugging
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Enable tmate debugging for secure troubleshooting'
        required: false
        default: false

jobs:
  config-validation:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@ba696adf55506673e48342a66e30f1f53cadeae0
        with:
          ruby-version: '3.4.9'
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node dependencies
        run: pnpm install

      - name: Generate JSON schemas
        run: pnpm run schema:generate

      - name: Validate example config
        run: pnpm run config:validate

      - name: Show config
        run: pnpm run config

      - name: Show config types
        run: pnpm run config --types

      - name: Validate test config
        continue-on-error: true
        run: |
          echo "Validating test configuration (may have intentional errors)..."
          bin/ots validate tests/unit/ruby/config.test.yaml || true
