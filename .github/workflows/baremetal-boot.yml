# ==============================================================================
# Bare-metal boot lane (install-onboarding C7 residuals 1 + 4)
# ==============================================================================
# The only lane that boots the app OUTSIDE a container image, and the boot-time
# guard for the POSIX-locale regression class (clean-room validation run 8):
# installer.yml's posix lane covers `rake ots:secrets` under an empty locale,
# but nothing guarded the BOOT leg — Ruby under LANG=C defaults external
# encoding to US-ASCII, so any config/locale reader that fails to declare its
# encoding crashes only here. Also closes residual 4: `pnpm run build` + the
# proof-of-life asset probe as a lane (a real Vite build, not a container's
# baked assets).
#
#   fresh runner -> bin/setup -> scripts/test-install/baremetal-boot.sh
#     (LANG=C: rake ots:secrets -> pnpm run build -> puma production boot
#      -> proof-of-life: homepage + /dist/assets/*.js + v1 at-most-once)
#
# Same artifact locally and in CI: scripts/test-install/baremetal-boot.sh.
# ==============================================================================
name: Bare-metal boot lane

on:
  pull_request:
    paths:
      - 'scripts/test-install/baremetal-boot.sh'
      - 'scripts/test-install/proof-of-life.sh'
      - 'lib/tasks/init.rake'
      - 'config.ru'
      - 'etc/defaults/**'
      - '.github/workflows/baremetal-boot.yml'
  schedule:
    # Weekly: app-code encoding regressions land without touching the paths
    # above — the cron is the real guard (the scheduled-lane pattern shared
    # by the other install lanes).
    - cron: '29 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baremetal-boot:
    name: rake ots:secrets + build + puma boot under LANG=C
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The lane starts its own throwaway instance on :2130; the apt-started
      # service on :6379 is harmless (same posture as fresh-clone).
      - name: Install datastore (redis-server, Valkey-compatible)
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server

      - name: Setup Ruby (.ruby-version)
        uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: false  # bin/setup runs `bundle install` itself

      - name: Setup Node (.node-version)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Python (locales:sync)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # bin/setup provides everything the lane's preflight demands: gems,
      # node_modules, generated/locales, generated/schemas, seeded etc/ config.
      - name: Run bin/setup
        run: bin/setup

      - name: Run bare-metal boot lane
        run: ./scripts/test-install/baremetal-boot.sh
