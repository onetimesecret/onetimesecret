# .github/workflows/build-and-publish-oci-images.yml
---
name: Build and Publish OCI Images

#
# OCI image tagging strategy:
#
# Release tags (v1.0.0):          v{version}, latest
# Release candidates (v1.0.0-rc1): v{version}, next
# Branch push:                    {branch-name}, edge
# Manual dispatch:                dev (or version_tag if provided)
# Scheduled (nightly):            nightly
#
# IMAGE_TAG carries the v-prefixed version for release builds;
# empty for non-release builds (only EXTRA_TAGS apply).
#
# Architecture:
#   Uses docker/bake-action with docker/bake.hcl to build all image
#   variants in a single job. Bake resolves the dependency graph
#   (base → dependencies → build → final) automatically.
#
# Debug Logging (Repository Variables):
#   ACTIONS_STEP_DEBUG=true    Enable purple debug output for all steps
#   ACTIONS_RUNNER_DEBUG=true  Enable runner diagnostic logging
#   Set in Settings → Secrets and variables → Actions → Variables
#
# Sentry Integration (Repository Secrets):
#   SENTRY_AUTH_TOKEN  API token with project:releases and org:read scopes
#   SENTRY_ORG         Organization slug (e.g., "onetimesecret")
#   SENTRY_URL         Sentry instance URL (omit for sentry.io)
#   SENTRY_PROJECTS    Space-separated project slugs (e.g., "frontend backend workers")
#
#   These enable: release creation, commit association, sourcemap upload,
#   and deploy notifications. All Sentry steps use continue-on-error so
#   missing secrets won't fail the build.
#

on:
  push:
    tags: ['v*']
  pull_request:
    types: [closed]
    branches: ['develop', 'feature/*', 'rel/*']
    # Don't deploy on PRs from forks
    paths-ignore:
      - '**'

  schedule:
    # Nightly build at 03:00 UTC (off-peak hours)
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      source_branch:
        type: string
        description: 'Branch to build from (defaults to the branch selected in the UI)'
        required: false
        default: ''
      version_tag:
        type: string
        description: 'Version tag for the image (e.g., "0.18.0-beta.1"). Does NOT create a git tag.'
        required: false
        default: ''
      registry_target:
        type: choice
        description: 'Target registry for built images'
        required: false
        default: 'custom'
        options:
          - 'custom'
          - 'public'
      debug_enabled:
        type: boolean
        description: 'Enable debug mode for build troubleshooting'
        required: false
        default: false
      platforms:
        type: choice
        description: 'Target platforms'
        required: false
        default: 'linux/amd64,linux/arm64'
        options:
          - ''
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build OCI Images
    runs-on: ubuntu-24.04
    if: github.repository == 'onetimesecret/onetimesecret'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_branch || github.ref }}
          fetch-depth: 0

      - name: Generate commit hash
        id: commit
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "${SHORT_SHA}" > .commit_hash.txt
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Commit hash recorded: ${SHORT_SHA}"

      - name: Compute and set package.json version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            # Tag build: script auto-detects version from GITHUB_REF
            ./.github/scripts/update-version.sh
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ -n "$INPUT_VERSION_TAG" ]]; then
            ./.github/scripts/update-version.sh "$INPUT_VERSION_TAG"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            ./.github/scripts/update-version.sh "0.0.0-nightly.$(date -u +%Y%m%d)"
          else
            BRANCH_SLUG=$(echo "${GITHUB_REF#refs/heads/}" | sed 's|/|-|g')
            ./.github/scripts/update-version.sh "0.0.0-${BRANCH_SLUG}.${SHORT_SHA}"
          fi

      - name: Compute version and tags
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Build comma-separated list of extra tags based on event context
          EXTRA_TAGS=""

          # Release tag (v1.0.0 → latest; v1.0.0-rc1 → next)
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG_NAME" == *"-rc"* ]]; then
              EXTRA_TAGS="next"
            else
              EXTRA_TAGS="latest"
            fi
          fi

          # Branch push → edge
          if [[ "$EVENT_NAME" == "push" ]] && [[ ! "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            # Sanitize branch name for Docker tag (replace / with -)
            BRANCH_TAG=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}${BRANCH_TAG},edge"
          fi

          # develop branch → next
          if [[ "$GITHUB_REF" == "refs/heads/develop" ]]; then
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}next"
          fi

          # Manual dispatch
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ -n "$INPUT_VERSION_TAG" ]]; then
              EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}${INPUT_VERSION_TAG}"
            else
              EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}dev"
            fi
          fi

          # Nightly schedule
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            EXTRA_TAGS="${EXTRA_TAGS:+${EXTRA_TAGS},}nightly"
          fi

          # Docker image tag: v-prefixed for tag builds, empty for non-tag builds
          if [[ "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            IMAGE_TAG="v${VERSION}"
          else
            IMAGE_TAG=""
          fi

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "extra_tags=${EXTRA_TAGS}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Extra tags: ${EXTRA_TAGS}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' && (inputs.registry_target || 'public') != 'custom'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request' && (inputs.registry_target || 'public') != 'custom'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into custom registry
        if: github.event_name != 'pull_request' && (inputs.registry_target || 'public') == 'custom'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ secrets.CUSTOM_REGISTRY_HOST }}
          username: ${{ secrets.CUSTOM_REGISTRY_USERNAME }}
          password: ${{ secrets.CUSTOM_REGISTRY_PASSWORD }}

      - name: Audit — resolved bake configuration
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          COMMIT_HASH: ${{ steps.commit.outputs.short_sha }}
          EXTRA_TAGS: ${{ steps.version.outputs.extra_tags }}
          PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.CUSTOM_REGISTRY_HOST }}
        run: |
          echo "::group::Bake resolved config (dry-run)"
          docker buildx bake -f docker/bake.hcl --print ci 2>&1 || true
          echo "::endgroup::"
          echo "::group::package.json version in build context"
          node -p "require('./package.json').version"
          echo "::endgroup::"

      - name: Build and push with Bake
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          COMMIT_HASH: ${{ steps.commit.outputs.short_sha }}
          EXTRA_TAGS: ${{ steps.version.outputs.extra_tags }}
          PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.CUSTOM_REGISTRY_HOST }}
        with:
          files: docker/bake.hcl
          targets: ci
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.args.VERSION=${{ steps.version.outputs.version }}
            *.args.COMMIT_HASH=${{ steps.commit.outputs.short_sha }}

      - name: Create Sentry release and associate commits
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_PROJECTS: ${{ secrets.SENTRY_PROJECTS }}
          SENTRY_RELEASE: ${{ steps.commit.outputs.short_sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_PROJECTS" ]; then
            echo "SENTRY_AUTH_TOKEN or SENTRY_PROJECTS not set, skipping Sentry release"
            exit 0
          fi
          # Build --project flags from space-separated list
          PROJECT_FLAGS=""
          for proj in $SENTRY_PROJECTS; do
            PROJECT_FLAGS="$PROJECT_FLAGS --project $proj"
          done
          echo "Creating release $SENTRY_RELEASE for projects: $SENTRY_PROJECTS"
          npx @sentry/cli releases new "$SENTRY_RELEASE" $PROJECT_FLAGS
          npx @sentry/cli releases set-commits "$SENTRY_RELEASE" --auto $PROJECT_FLAGS
          npx @sentry/cli releases finalize "$SENTRY_RELEASE" $PROJECT_FLAGS

      - name: Upload frontend sourcemaps to Sentry
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_RELEASE: ${{ steps.commit.outputs.short_sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping sourcemaps upload"
            exit 0
          fi
          npx @sentry/cli sourcemaps upload ./public/web/dist \
            --release="$SENTRY_RELEASE" \
            --project=frontend \
            --dist=frontend \
            --url-prefix='~/dist'

      - name: Create Sentry deploy notification
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          SENTRY_RELEASE: ${{ steps.commit.outputs.short_sha }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN not set, skipping deploy notification"
            exit 0
          fi
          npx @sentry/cli releases deploys "$SENTRY_RELEASE" new -e production

      - name: Audit — verify image version
        if: success()
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          BUILD_IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          BUILD_EXTRA_TAGS: ${{ steps.version.outputs.extra_tags }}
          REGISTRY_MODE: ${{ inputs.registry_target || 'public' }}
          CUSTOM_REGISTRY: ${{ secrets.CUSTOM_REGISTRY_HOST }}
        run: |
          # Determine image reference to inspect
          if [ "${REGISTRY_MODE}" = "custom" ] && [ -n "${CUSTOM_REGISTRY}" ]; then
            REGISTRY_PREFIX="${CUSTOM_REGISTRY}/onetimesecret"
          else
            REGISTRY_PREFIX="ghcr.io/onetimesecret"
          fi

          # Use IMAGE_TAG if available (release builds), otherwise first EXTRA_TAG
          if [ -n "${BUILD_IMAGE_TAG}" ]; then
            IMAGE_REF="${REGISTRY_PREFIX}/onetimesecret:${BUILD_IMAGE_TAG}"
          else
            FIRST_TAG=$(echo "${BUILD_EXTRA_TAGS}" | cut -d',' -f1 | tr -d ' ')
            IMAGE_REF="${REGISTRY_PREFIX}/onetimesecret:${FIRST_TAG}"
          fi

          echo "::group::Image version check (${IMAGE_REF})"
          podman pull "${IMAGE_REF}" --quiet
          ACTUAL_VERSION=$(podman run --rm --entrypoint cat "${IMAGE_REF}" package.json \
            | grep -o '"version": "[^"]*"' || echo '"version": "UNKNOWN"')
          echo "Expected: ${BUILD_VERSION}"
          echo "Actual:   ${ACTUAL_VERSION}"
          echo "::endgroup::"

      - name: Output build summary
        env:
          BUILD_PLATFORMS: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          BUILD_IMAGE_TAG: ${{ steps.version.outputs.image_tag }}
          BUILD_COMMIT: ${{ steps.commit.outputs.short_sha }}
          BUILD_EXTRA_TAGS: ${{ steps.version.outputs.extra_tags }}
        run: |
          {
            echo "## OCI Image Build Complete"
            echo ""
            echo "**Bake file:** docker/bake.hcl"
            echo "**Targets:** ci (main, s6, lite)"
            echo "**Platforms:** ${BUILD_PLATFORMS}"
            echo "**Version:** ${BUILD_VERSION}"
            echo "**Image tag:** ${BUILD_IMAGE_TAG:-*(none — non-tag build)*}"
            echo "**Commit:** ${BUILD_COMMIT}"
            echo "**Extra tags:** ${BUILD_EXTRA_TAGS}"
          } >> "$GITHUB_STEP_SUMMARY"
