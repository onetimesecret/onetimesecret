# .github/workflows/e2e-integration.yml
---
name: Container E2E Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: false
        default: 'integration'
        type: choice
        options:
          - integration
          - staging-like
      debug:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean
  pull_request:
    branches: [develop, main, 'rel/*']
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'public/**'
      - 'templates/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      # The suite itself: spec/config changes must run the suite they change
      - 'e2e/**'
      - 'eslint.config.ts'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container-e2e-tests:
    # Must exceed Playwright's globalTimeout (20 min, e2e/playwright.config.ts)
    # plus ~4-5 min of image build + container startup + artifact upload.
    timeout-minutes: 30
    runs-on: ubuntu-24.04

    env:
      OCI_IMAGE_NAME: onetimesecret-e2e-test
      CONTAINER_NAME: onetimesecret-e2e
      REDIS_CONTAINER_NAME: redis-e2e
      TEST_BASE_URL: http://localhost:3000
      DEBUG_ENABLED: ${{ github.event.inputs.debug == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js for Playwright
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          run_install: false

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build OCI image
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        with:
          source: .
          files: docker/bake.hcl
          targets: main
          load: true
          set: |
            main.tags=${{ env.OCI_IMAGE_NAME }}
            main.args.VERSION=ci-test
            main.args.ALLOW_DEV_VERSION=true

      - name: Start Redis service
        run: |
          echo "🚀 Starting Redis service..."
          docker run -d \
            --name ${{ env.REDIS_CONTAINER_NAME }} \
            --health-cmd "redis-cli ping || exit 1" \
            --health-interval 5s \
            --health-timeout 3s \
            --health-retries 10 \
            -p 6379:6379 \
            ghcr.io/valkey-io/valkey:8.1.3-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571

          # Wait for Redis to be healthy
          echo "⏳ Waiting for Redis to be ready..."
          timeout 60 bash -c 'until docker exec ${{ env.REDIS_CONTAINER_NAME }} redis-cli ping; do sleep 2; done'

      - name: Start OneTime Secret application
        run: |
          echo "🚀 Starting OneTime Secret application..."

          # Generate a secure secret for testing
          TEST_SECRET=$(openssl rand -hex 32)

          # Pin a deterministic brand color so the container is "branded" and
          # head-base.rue renders the mask-icon/theme-color tags. #3B82F6 is the
          # neutral default (#3049); the brand-customization E2E asserts the
          # mask-icon color matches it exactly. Without this the tags are
          # correctly omitted (unbranded) and that assertion has nothing to test.
          #
          # AUTH_AUTOVERIFY=true makes accounts created via /signup verified
          # immediately (no email round-trip), which is what lets the e2e
          # auth setup project (e2e/global.setup.ts) register + sign in the
          # ephemeral TEST_USER_* account for the full/ suite.
          #
          # EMAILER_MODE=logger routes outbound email to the logging backend
          # instead of SMTP. Without it, emailer.mode defaults to 'smtp' and
          # emailer.host to the placeholder 'smtp.provider.com' (etc/defaults/
          # config.defaults.yaml). With jobs disabled (default), email-sending
          # flows fall back to *synchronous* delivery (publisher.rb), so any
          # flow that emails — e.g. org invitations (fallback: :sync) — tries
          # to connect to that unreachable host and the request 500s. There is
          # no SMTP/Mailpit sidecar here and the suite never reads real emails
          # (invite tokens come from the API), so logging delivery is correct.
          docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            --link ${{ env.REDIS_CONTAINER_NAME }}:redis \
            -p 3000:3000 \
            -e REDIS_URL=redis://redis:6379/0 \
            -e SECRET="$TEST_SECRET" \
            -e HOST=localhost:3000 \
            -e SSL=false \
            -e RACK_ENV=production \
            -e BRAND_PRIMARY_COLOR='#3B82F6' \
            -e AUTH_AUTOVERIFY=true \
            -e EMAILER_MODE=logger \
            ${{ env.OCI_IMAGE_NAME }}

          if [ "${{ env.DEBUG_ENABLED }}" == "true" ]; then
            echo "🔍 Container details:"
            docker ps
            echo "🔍 Container environment:"
            docker exec ${{ env.CONTAINER_NAME }} env | sort
          fi

      - name: Wait for application to be ready
        run: |
          echo "⏳ Waiting for application to be ready..."

          # Wait up to 2 minutes for the app to start
          timeout 120 bash -c '
            until curl -f -s ${{ env.TEST_BASE_URL }}/health > /dev/null 2>&1 || \
                  curl -f -s ${{ env.TEST_BASE_URL }}/ > /dev/null 2>&1; do
              echo "Waiting for app to respond..."
              sleep 5
            done
          '

          echo "✅ Application is responding"

      - name: Validate application health
        run: |
          echo "🔍 Running application health checks..."

          # Test homepage
          response_code=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.TEST_BASE_URL }}/)
          if [ "$response_code" != "200" ]; then
            echo "❌ Homepage failed (HTTP $response_code)"
            exit 1
          fi

          # Test that page contains expected content (bootstrap state injection)
          homepage_content=$(curl -s ${{ env.TEST_BASE_URL }}/)
          if ! echo "$homepage_content" | grep -q "__BOOTSTRAP_ME__"; then
            echo "❌ Homepage doesn't contain expected content"
            echo "Content preview: $(echo "$homepage_content" | head -c 200)..."
            exit 1
          fi

          echo "✅ Basic health checks passed"

      - name: Run Playwright E2E tests
        id: playwright
        run: |
          echo "🎭 Running Playwright E2E tests against containerized application..."

          # Set environment variables for Playwright
          export PLAYWRIGHT_BASE_URL=${{ env.TEST_BASE_URL }}
          export CI=true

          # Reporters come from e2e/playwright.config.ts (CI branch: list,
          # github, html, json, blob). Do NOT pass --reporter here - a CLI
          # override replaces the whole array and breaks the report artifacts
          # and the flaky gate below.

          # Ephemeral credentials for the authenticated 'full/' suite.
          # e2e/global.setup.ts registers this account via the app's own
          # /signup flow (AUTH_AUTOVERIFY=true on the container makes it
          # immediately sign-in-able) and saves the session for storageState.
          # Never hardcode these; they live only for this container's life.
          export TEST_USER_EMAIL="e2e-$(openssl rand -hex 8)@example.com"
          TEST_USER_PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$TEST_USER_PASSWORD"
          export TEST_USER_PASSWORD

          # Run 'all/' (credential-free) and 'full/' (authenticated via the
          # setup project + storageState; see e2e/playwright.config.ts).
          # 'full-billing/' additionally requires billing to be enabled on
          # the container, which CI does not configure yet. The trailing
          # slashes matter: CLI filters are partial-path matches, so a bare
          # 'e2e/full' would also pull in 'e2e/full-billing/'.
          #
          # --max-failures=20: the full/ suite is newly enabled and still
          # being triaged (e2e/docs/e2e-remediation-plan.md, Phase 2). At 5,
          # one failure class aborts the run and hides everything behind it
          # ("272 did not run" on the first #3412 run); 20 keeps the
          # circuit-breaker for catastrophic runs while surfacing whole
          # failure classes per CI cycle. Tighten again once triage is done.
          pnpm test:playwright e2e/all/ e2e/full/ \
            --max-failures=20
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.TEST_BASE_URL }}

      - name: Fail on flaky tests (passed only on retry)
        # Run whenever Playwright ran, even if it failed (flake info still useful)
        if: ${{ !cancelled() && steps.playwright.outcome != 'skipped' }}
        run: |
          REPORT=e2e/test-results/results.json

          if [ ! -f "$REPORT" ]; then
            echo "❌ Playwright JSON report not found at $REPORT."
            echo "The reporter pipeline is broken (see e2e/playwright.config.ts)."
            exit 1
          fi

          FLAKY=$(jq -r '.stats.flaky // 0' "$REPORT")
          if [ "$FLAKY" -gt 0 ]; then
            echo "❌ $FLAKY test(s) passed only on retry (flaky outcome)."
            echo "Flake is blocking, not silent - fix or quarantine via e2e/QUARANTINE.md."
            echo "See e2e/docs/e2e-remediation-plan.md (guiding principle 3)."
            echo ""
            echo "Flaky tests:"
            jq -r '.. | objects | select(has("tests")) | select(any(.tests[]?; .status == "flaky"))
                   | "  - \(.file):\(.line) › \(.title)"' "$REPORT"
            exit 1
          fi

          echo "✅ No flaky (retry-only) passes detected."

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-e2e-integration
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload Playwright test artifacts (traces, screenshots, videos)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-test-results-e2e-integration
          path: e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Debug on failure
        if: failure() && env.DEBUG_ENABLED == 'true'
        run: |
          echo "🐛 Debug information:"

          echo "=== Container status ==="
          docker ps -a

          echo "=== Application logs ==="
          docker logs ${{ env.CONTAINER_NAME }} --tail 100

          echo "=== Redis logs ==="
          docker logs ${{ env.REDIS_CONTAINER_NAME }} --tail 50

          echo "=== Network connectivity ==="
          curl -v ${{ env.TEST_BASE_URL }}/ || true

          echo "=== Docker network info ==="
          docker network ls
          docker inspect bridge

      - name: Cleanup containers
        if: always()
        run: |
          echo "🧹 Cleaning up containers..."
          docker stop ${{ env.CONTAINER_NAME }} ${{ env.REDIS_CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} ${{ env.REDIS_CONTAINER_NAME }} || true
          docker rmi ${{ env.OCI_IMAGE_NAME }} || true

  notify-results:
    runs-on: ubuntu-24.04
    needs: container-e2e-tests
    if: always()
    steps:
      - name: Notify Results
        run: |
          if [ "${{ needs.container-e2e-tests.result }}" == "success" ]; then
            echo "✅ E2E integration tests passed!"
            echo "The production OCI image successfully serves the application and passes E2E tests."
          else
            echo "❌ E2E integration tests failed!"
            echo "There may be issues with the production build, OCI image, or application runtime."
          fi
