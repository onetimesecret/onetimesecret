# .github/actions/setup-node-env/action.yml
---
# ==============================================================================
# Setup Node.js Environment - Composite Action
# ==============================================================================
# Version: 1.0.0
# Repository: onetimesecret/onetimesecret
#
# Prepares a Node.js environment with pnpm and caching for CI jobs.
# Consolidates common frontend setup steps.
#
# Setup Steps:
#   1. Install Node.js (default: v25)
#   2. Install pnpm package manager
#   3. Configure pnpm store caching
#   4. Install dependencies with frozen lockfile (optional)
#
# Usage:
#   - uses: ./.github/actions/setup-node-env
#     with:
#       node-version: '25'
#       install-dependencies: 'true'
#
# Changelog:
#   1.0.0 - Initial release consolidating Node setup from ci.yml
# ==============================================================================

name: Setup Node.js Environment
description: |
  Sets up Node.js with pnpm and caching for CI jobs.
  Handles Node.js installation, pnpm setup, cache configuration,
  and dependency installation.

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '25'
  install-dependencies:
    description: 'Whether to run pnpm install'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - name: Setup pnpm cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
