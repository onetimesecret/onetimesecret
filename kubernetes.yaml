apiVersion: apps/v1
kind: Deployment
metadata:
  name: ots
  namespace: default
spec:
  replicas: 1
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: ots
  template:
    metadata:
      namespace: default
      labels:
        app: ots
        api-version: v1
        tier: app
    spec:
      containers:
        - name: ots
          image: tmregistry.azurecr.io/onetimesecret:0.0.5
          imagePullPolicy: Always
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          env:
            - name: HOST
              value: ots.time-matters.com
            - name: RACK_ENV
              value: production
            - name: REDIS_URL
              value: redis://ots-redis-service-v1:6379/0
            - name: SECRET
              value: f22f76a8874bd186a7a66c79e7554872e0b6526e0f0a1eeaab09325078e5a037
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ots-redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: ots-redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '1m'
---
apiVersion: v1
kind: Service
metadata:
  name: ots-redis-service-v1
  namespace: default
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: ots-service-v1
  namespace: default
  labels:
    app: ots
    api-version: v1
spec:
  selector:
    app: ots
    api-version: v1
  ports:
    - name: ots
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
  sessionAffinity: None
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: cors-headers
  namespace: default
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - OPTIONS
      - PUT
      - POST
      - DELETE
    accessControlAllowOriginList:
      - "https://ots.time-matters.com"
    accessControlAllowHeaders:
      - "Content-Type"
      - "Authorization"
      - "Accept"
      - "Origin"
      - "X-Requested-With"
    accessControlMaxAge: 100
    addVaryHeader: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ots-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: default-cors-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ots.time-matters.com
      secretName: tls-secret
  rules:
    - host: ots.time-matters.com
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: ots-service-v1
                port:
                  number: 3000
