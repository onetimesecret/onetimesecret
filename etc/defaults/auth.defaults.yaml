# etc/defaults/auth.defaults.yaml
#
# Authentication Configuration for OneTimeSecret
# Controls the authentication mode and related settings
---
# Authentication mode: 'simple' (Redis-only) or 'full' (requires SQL db)
# Can be overridden with AUTHENTICATION_MODE environment variable
mode: <%= ENV['AUTHENTICATION_MODE'] || 'simple' %>

# NOTE: Session configuration has been moved to config.yaml under site.session
# Session handling is auth-mode agnostic (works with simple or full mode).

# Simple mode settings (Redis-only authentication)
simple:
  #password_hash_cost: 12
  #session_timeout: 86400    # 24 hours

# Full mode settings (Rodauth-based application)
full:
  # Application Connection
  #
  # Used at runtime by the application.
  #
  # e.g. "postgres://user:password@host:port/database"
  #
  # SQLite paths:
  #   sqlite::memory: - In-memory, no persistence (dev/test only)
  #   sqlite://data/auth.db - Relative path from application directory
  #   sqlite:///data/auth.db - Absolute path from filesystem root
  #   sqlite:///tmp/auth.db - Temporary, lost on restart
  #
  # ⚠️  In OCI containers: SQLite files MUST be in a mounted volume directory
  #     (e.g., /app/data or /data) or all data will be lost on container restart.
  #
  # NOTE: The double quotes prevent YAML issues when parsing `sqlite::memory:`
  database_url: "<%= ENV['AUTH_DATABASE_URL'] || 'sqlite://data/auth.db' %>"

  # Migrations Connection (PostgreSQL, MySQL, MS SQL Server only)
  #
  # Used at deployment time to run all Rodauth migrations:
  #   - Set up the schema with appropriate permissions
  #   - Create database functions for password verification
  #   - Grant specific access to the application account as needed
  #
  # When using this approach, the application account should only have EXECUTE
  # permission on the password hash verification functions and should not have
  # SELECT access to the password hash column.
  #
  # Not needed for SQLite or other databases that don't support this security model.
  #
  database_url_migrations: <%= ENV['AUTH_DATABASE_URL_MIGRATIONS'] || nil %>

  # Service URL (used for internal requests)
  #service_url: <%= ENV['AUTH_SERVICE_URL'] || 'http://127.0.0.1:3000/auth' %>

  # Optional Rodauth features (enabled via ENV variables)
  #
  # Pattern: Features default ON use `!= 'false'` (must explicitly disable)
  #          Features default OFF use `== 'true'` (must explicitly enable)
  #
  features:
    # Brute force lockout protection (default: ON)
    lockout: <%= ENV['AUTH_LOCKOUT_ENABLED'] != 'false' %>

    # Password strength requirements (default: ON)
    password_requirements: <%= ENV['AUTH_PASSWORD_REQUIREMENTS_ENABLED'] != 'false' %>

    # Session tracking: view and manage active sessions (default: ON)
    active_sessions: <%= ENV['AUTH_ACTIVE_SESSIONS_ENABLED'] != 'false' %>

    # Remember me: persistent login across browser sessions (default: ON)
    remember_me: <%= ENV['AUTH_REMEMBER_ME_ENABLED'] != 'false' %>

    # Email verification: require email verification on signup (default: ON, OFF in test)
    verify_account: <%= ENV['AUTH_VERIFY_ACCOUNT_ENABLED'] != 'false' && ENV['RACK_ENV'] != 'test' %>

    # MFA: TOTP codes and recovery codes (default: OFF)
    mfa: <%= ENV['AUTH_MFA_ENABLED'] == 'true' %>

    # Email auth: passwordless login via email links, aka magic links (default: OFF)
    email_auth: <%= ENV['AUTH_EMAIL_AUTH_ENABLED'] == 'true' %>

    # WebAuthn: biometrics and security keys (default: OFF)
    webauthn: <%= ENV['AUTH_WEBAUTHN_ENABLED'] == 'true' %>

    # SSO: external identity providers via OmniAuth (default: OFF)
    # Master switch — individual providers are enabled by their own env vars:
    #   OIDC: OIDC_ISSUER, OIDC_CLIENT_ID
    #   Entra ID: ENTRA_TENANT_ID, ENTRA_CLIENT_ID, ENTRA_CLIENT_SECRET
    #   Google: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
    #   GitHub: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
    sso: <%= ENV['AUTH_SSO_ENABLED'] == 'true' %>

  # ──────────────────────────────────────────────────────────────────────
  # Single-authentication-method overrides (mutually exclusive)
  #
  # When mode=full, exactly ONE of these may be set to 'true'.
  # Setting a *_ONLY flag restricts the login page to that single
  # authentication method and disables account-management actions that
  # don't apply (e.g. password change when using SSO-only).
  #
  # If none are set, all enabled authentication methods are shown.
  # If more than one is set, the configuration is invalid and the
  # application falls back to showing all enabled methods.
  # ──────────────────────────────────────────────────────────────────────
  single_auth_method:
    # Password-only mode: show only the password form on the login page.
    # Other enabled auth methods (SSO, WebAuthn, magic links) are hidden.
    password_only: <%= ENV['AUTH_PASSWORD_ONLY'] == 'true' %>

    # Email-auth-only (magic links) mode: show only the email link form.
    # Requires AUTH_EMAIL_AUTH_ENABLED=true to take effect.
    email_auth_only: <%= ENV['AUTH_EMAIL_AUTH_ONLY'] == 'true' %>

    # WebAuthn-only mode: show only biometric/security-key authentication.
    # Requires AUTH_WEBAUTHN_ENABLED=true to take effect.
    webauthn_only: <%= ENV['AUTH_WEBAUTHN_ONLY'] == 'true' %>

    # SSO-only mode: show only SSO provider buttons on the login page
    # and disable password-based account management (destroy account,
    # change password, change email). Users must manage credentials
    # through the SSO identity provider.
    # Requires AUTH_SSO_ENABLED=true and at least one provider configured.
    sso_only: <%= ENV['AUTH_SSO_ONLY'] == 'true' %>

  # SSO configuration section
  #
  # Settings that control SSO behavior beyond the feature toggle.
  # These are separate from `features` because they configure how SSO
  # works rather than whether it's enabled.
  sso:
    # SSO display name (shown on "Sign in with X" button)
    # DEPRECATED: Each provider now carries its own display name via
    # OIDC_DISPLAY_NAME, ENTRA_DISPLAY_NAME, GOOGLE_DISPLAY_NAME, etc.
    # Retained for backward compatibility with single-provider OIDC setups.
    sso_display_name: <%= ENV.fetch('SSO_DISPLAY_NAME', '') %>

    sso_only: <%= ENV['AUTH_SSO_ONLY'] == 'true' %>

  # Argon2 secret key (pepper) for password hashing defense-in-depth.
  # Folded into password hashes — if the hash database is compromised,
  # passwords remain protected unless this secret is also leaked.
  # Leave unset (nil) to use argon2id without a pepper.
  argon2_secret: <%= ENV["ARGON2_SECRET"] || nil %>
