##
# DOCKER COMPOSE - ONETIME SECRET
#
# Default: Simple deployment (App + Valkey). Just run:
#
#     $ [ -f .env ] || cp -p .env.example .env
#     $ docker compose up
#
# For the full production stack (Caddy TLS, RabbitMQ, workers,
# scheduler), comment out the simple include and uncomment full:
#
#     include:
#       # - path: docker/compose/docker-compose.simple.yml
#       - path: docker/compose/docker-compose.full.yml
#
# See docker/README.md for complete setup and usage documentation.
#
# Root compose files (CP-13 naming convention):
#   docker-compose.yml  (this file)  — DEPLOYMENT entry point; includes one
#                                      stack from docker/compose/*.yml.
#   compose.test.yml                 — TEST-LANE service dependencies only
#                                      (valkey/postgres/rabbitmq on 21xx
#                                      ports); never runs the app.

include:
  - path: docker/compose/docker-compose.simple.yml
  # - path: docker/compose/docker-compose.full.yml
